# Encoder 导出默认配置。
# 对应 `scripts/run_export.py` 参数。

# 示例：
# mae_ckpt_path: ./outputs/ckpt/20260325_0830/mae_ckpt_150.pth
# config_path: ./outputs/ckpt/20260325_0830/poly_mae_config.json
# output_path: ./outputs/ckpt/20260325_0830/poly_encoder_exported.pth

# MAE 训练检查点路径（必填，可通过 CLI 覆盖）。
mae_ckpt_path: ""
# 模型结构配置路径（通常是训练目录中的 `poly_mae_config.json` 或 `config.yaml`）。
config_path: ""
# 导出的 encoder-only 权重输出路径。
output_path: ""
# 导出时加载与保存精度：支持 fp32 / bf16 / fp16；fp13 作为 fp16 兼容别名。
precision: bf16
